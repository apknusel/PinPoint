<html>
  
<head>
  <style>
    .searchbar-wrapper {
      width: 35vw;
      position: fixed;
      top: 40px;
      left: 2px;
    }

    .searchbar-dropdown {
      background: #f6f6f6;
      margin: 0px 20px 0px 20px;
    }

    .search-input {
      box-sizing: border-box;
      font-size: 16px;
      padding: 6px 15px 6px 20px;
      border-color: rgb(97, 95, 95);
      border-radius: 2.1rem;
      width: 100%;
    }

    .search-input:focus {
      outline: 3px solid #5080e1;
    }

    .dropdown-entries {
      display: flex;
      align-items: center;
      color: black;
      padding: 5px 16px;
      text-decoration: none;
      background-color: #F4F1F0;
      transition: background-color 0.15s ease;
    }

    .dropdown-entries:hover {
      background-color: #ddd;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      margin: 8px;
    }
  </style>
</head>
<div id="searchbarWrapper" class="searchbar-wrapper">
  <input type="text" placeholder="Search.." class="search-input" id="searchInput">
  <div class="searchbar-dropdown" id="searchbarDropdown">
  </div>
</div>

<script>
  // TODO: replace 'profile' with the profile/posts route name
  const url = "{{ url_for('profile', username='__name__') }}";
  const search_input = document.getElementById('searchInput');
  const search_results = document.getElementById('searchbarDropdown');
  const searchbar_wrapper = document.getElementById('searchbarWrapper');
  search_input.addEventListener('input', filterFunction);

  async function filterFunction() {
    console.log('runs');
    let user_data = [];
    const filter = search_input.value;

    if (!filter) {
      search_results.innerHTML = "";
      return;
    }

    try {
      const response = await fetch(`/api/search_users?name=${encodeURIComponent(filter)}`);
      if (!response.ok) throw new Error("Fetch error");
      user_data = await response.json();
    } catch (err) {
      console.log(err);
      return;
    }

    console.log(user_data.length);

    search_results.innerHTML = "";
    if (!user_data.length) {
      searchbar_wrapper.className = "searchbar-wrapper";
      return;
    }

    for (const { user_id, nickname, picture } of user_data) {
      user = createElement(nickname, picture);
      search_results.append(user);
    }
  }

  function createElement(name, picture) {
    const link = document.createElement('a');
    link.href = url.replace('__name__', encodeURIComponent(name));
    link.className = "dropdown-entries";

    const img = document.createElement('img');
    img.src = String(picture);
    img.className = "user-avatar";
    console.log(link);

    const text = document.createElement('span');
    text.innerText = name;

    link.appendChild(img);
    link.appendChild(text);

    return link;
  }
</script>

</html>
