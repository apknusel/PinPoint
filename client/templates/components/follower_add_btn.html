{% if not is_self and is_logged_in %}
{% if relation == "pending" %}
<button id="addFollower" class="btn btn-follow" type="button" disabled>
  pending
</button>
{% elif relation == "following" %}
<button id="addFollower" class="btn btn-follow" type="button" onclick="requestUnfollow()">
  unfollow
</button>
{% else %}
<button id="addFollower" class="btn btn-follow" type="button" onclick="requestFollowing()">
  + follow
</button>
{% endif %}
{% endif %}
