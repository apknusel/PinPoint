<h3 class="section-title">Followers</h3>
<div class="follower-list">
{% for follower in followers_data.followed_by %}
{% if follower['is_accepted'] %}
    <div class="follower-entries">
        <img class="follower-avatar" src="{{follower['follower_picture']}}" alt="{{ follower['follower_name'] }}" />
        <div class="follower-info">
            <h3 class="follower-name">{{ follower['follower_name'] }}</h3>
            <p class="follower-date">{{ follower['created_at'] }}</p>
        </div>
        {% if is_self %}
        <button class="btn btn-remove" value="{{ follower['follower_id'] }}" onclick="requestHandler(event, false)">
            Remove
        </button>
        {% endif %}
    </div>
{% endif %}
{% endfor %}
</div>
