<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endblock %}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
        integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/searchbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user_location_btn.css') }}">
    {% block scripts %}{% endblock %}
    {% block head %}{% endblock %}
</head>
<body>
    {% block navbar %}
    {% include 'navbar.html' %}
    {% include './components/user_location_btn.html' %}
    {% endblock %}
    <div id="layout" class="pure-g">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/searchbar.js') }}"></script> 
    <script src="{{ url_for('static', filename='js/user_location_btn.js') }}"></script> 
</body>

</html>
